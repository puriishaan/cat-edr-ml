name: cat-edr-ml
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Data handling
  - xarray>=2024.1
  - cfgrib>=0.9.14
  - eccodes>=2.34
  - netcdf4>=1.6
  - pandas>=2.1
  - numpy>=1.26
  - pyarrow>=15.0
  # Atmospheric science
  - metpy>=1.6
  # Scientific computing
  - scipy>=1.12
  - scikit-learn>=1.4
  - xgboost>=2.0
  # Satellite / cloud data
  - s3fs>=2024.1
  - satpy>=0.47
  # ERA5 access
  - cdsapi>=0.7
  # Visualization
  - matplotlib>=3.8
  - cartopy>=0.22
  # Jupyter
  - jupyter>=1.0
  - ipykernel>=6.29
  - ipywidgets>=8.1
  # Utilities
  - tqdm>=4.66
  - pyyaml>=6.0
  # Hyperparameter search
  - optuna>=3.6
  - pip
  - pip:
    - goes2go>=2024.1
    - torch --index-url https://download.pytorch.org/whl/cpu
