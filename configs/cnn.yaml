seed: 42
grid_size: 24
primary_levels: [225, 250, 300]
moderate_threshold: 0.35
test_frac: 0.15

train:
  epochs: 80
  lr: 0.001
  batch_size: 16
  weight_decay: 0.0001
  early_stop_patience: 15
  n_folds: 5
  scheduler: cosine

model:
  depth: 3
  base_filters: 32
  kernel_size: 3
  dropout: 0.1
  norm: batch
  pool: max
  act: gelu
  film: true
  sat_fusion: true
  aggregation: logsumexp
  topk: 4

loss:
  lambda_mean: 0.2
  lambda_phys: 0.1
  lambda_tv: 0.05
  lambda_cap: 0.05
  huber_delta: 0.1
  mag_weight_exp: 2.0
  cap_value: 1.05

tune:
  n_trials: 30
  timeout: 3600
  space:
    depth:
      type: int
      low: 2
      high: 4
    base_filters:
      type: categorical
      choices: [16, 32, 64]
    dropout:
      type: float
      low: 0.0
      high: 0.3
    lr:
      type: float
      low: 0.0001
      high: 0.01
      log: true
    batch_size:
      type: categorical
      choices: [8, 16, 32]
    film:
      type: categorical
      choices: [true, false]
    aggregation:
      type: categorical
      choices: [logsumexp, topk]
    norm:
      type: categorical
      choices: [batch, group]
    act:
      type: categorical
      choices: [relu, gelu, silu]
